version: "3.8"

services:
  db:
    image: postgres:16-alpine
    container_name: vpn_backend_db
    environment:
      POSTGRES_DB: vpn_db
      POSTGRES_USER: vpn_user
      POSTGRES_PASSWORD: vpn_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn_user -d vpn_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: vpn_backend_app
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql+asyncpg://vpn_user:vpn_password@db:5432/vpn_db"
      DEBUG: "false"
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  pgdata:
